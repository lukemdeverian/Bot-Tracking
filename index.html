<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Chronos Crate</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="storefront">
      <section class="product-column" aria-labelledby="product-title">
        <p class="eyebrow">Now accepting pre-orders from yesterday</p>
        <h1 id="product-title">The Chronos Crate</h1>
        <p class="lead">
          Skip the wait, outrun your calendar, and arrive fashionably early to
          events that technically already happened.
        </p>

        <div class="product-meta" aria-label="Product highlights">
          <span>12 era presets</span>
          <span>Paradox warranty</span>
          <span>Ships last Tuesday</span>
        </div>

        <div class="machine-visual" aria-label="The Chronos Crate product preview">
          <div class="machine-shell">
            <div class="machine-top"></div>
            <div class="machine-screen">
              <span>1888</span>
              <strong>to</strong>
              <span>2088</span>
            </div>
            <div class="machine-controls">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="machine-door">
              <div></div>
            </div>
          </div>
          <div class="price-tag">
            <span>Launch price</span>
            <strong>$8,888.08</strong>
          </div>
        </div>
      </section>

      <section class="checkout-panel" aria-labelledby="checkout-title">
        <p class="eyebrow">Reserve your departure</p>
        <h2 id="checkout-title">Checkout</h2>

        <form class="checkout-form" action="/checkout" method="post" autocomplete="off">
          <div class="field-grid two-column">
            <label class="field">
              <span>First name</span>
              <input type="text" name="first_name" placeholder="Jane" />
            </label>

            <label class="field">
              <span>Last name</span>
              <input type="text" name="last_name" placeholder="Doe" />
            </label>
          </div>

          <div class="field-grid two-column">
            <label class="field">
              <span>Email</span>
              <input type="email" name="email" placeholder="jane@example.com" />
            </label>

            <label class="field">
              <span>Phone number</span>
              <input type="tel" name="phone_number" placeholder="(555) 123-4567" />
            </label>
          </div>

          <label class="field">
            <span>Street address</span>
            <input type="text" name="street_address" placeholder="123 Example Ave" />
          </label>

          <div class="field-grid three-column">
            <label class="field">
              <span>City</span>
              <input type="text" name="city" placeholder="Springfield" />
            </label>

            <label class="field">
              <span>State</span>
              <input type="text" name="state" placeholder="CA" maxlength="2" />
            </label>

            <label class="field">
              <span>ZIP</span>
              <input type="text" name="zip" placeholder="90210" inputmode="numeric" />
            </label>
          </div>

          <div class="field-grid two-column">
            <label class="field">
              <span>Website</span>
              <input type="url" name="website" placeholder="https://example.com" />
            </label>

            <label class="field">
              <span>Destination year</span>
              <input type="text" name="destination_year" placeholder="1985" inputmode="numeric" />
            </label>
          </div>

          <div class="field-grid two-column">
            <label class="field">
              <span>Username</span>
              <input type="text" name="username" placeholder="chronos_jane" />
            </label>

            <label class="field">
              <span>Password</span>
              <input type="password" name="account_password" placeholder="********" />
            </label>
          </div>

          <label class="field">
            <span>Card number</span>
            <input
              type="text"
              name="card_number"
              placeholder="4111 1111 1111 1111"
              inputmode="numeric"
            />
          </label>

          <div class="field-grid three-column">
            <label class="field">
              <span>Expiration</span>
              <input type="text" name="expiration" placeholder="MM / YY" inputmode="numeric" />
            </label>

            <label class="field">
              <span>Security code</span>
              <input type="text" name="security_code" placeholder="123" inputmode="numeric" />
            </label>

            <label class="field">
              <span>Quantity</span>
              <input type="text" name="quantity" placeholder="1" inputmode="numeric" />
            </label>
          </div>

          <div class="bot-field" aria-hidden="true">
            <label>
              Company
              <input type="text" name="company" tabindex="-1" autocomplete="off" />
            </label>
          </div>

          <button type="submit">Reserve Now</button>
        </form>
      </section>
    </main>
  </body>
</html>
